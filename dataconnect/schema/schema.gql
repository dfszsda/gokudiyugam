type User @table {
  username: String!
  email: String!
  passwordHash: String!
  createdAt: Timestamp!
  displayName: String
  bio: String
  profilePictureUrl: String
  lastLoginAt: Timestamp
}

type Practice @table {
  title: String!
  description: String!
  durationMinutes: Int!
  type: String!
  createdAt: Timestamp!
  audioUrl: String
  videoUrl: String
  imageUrl: String
  difficultyLevel: String
}

type UserPractice @table(key: ["user", "practice"]) {
  user: User!
  practice: Practice!
  completedAt: Timestamp!
  durationPracticedMinutes: Int!
  rating: Int
  userNotes: String
}

type Reflection @table {
  user: User!
  title: String!
  content: String!
  createdAt: Timestamp!
  associatedPractice: Practice
  isPrivate: Boolean
}

type Group @table {
  creator: User!
  name: String!
  type: String!
  createdAt: Timestamp!
  description: String
  imageUrl: String
}

type GroupMember @table(key: ["user", "group"]) {
  user: User!
  group: Group!
  joinedAt: Timestamp!
  role: String!
}