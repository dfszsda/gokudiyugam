<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gokudiyugam Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #6200EE; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: var(--primary-color) !important; }
        .admin-card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); background: white; }
        .hidden { display: none !important; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .list-group-item.active { background-color: var(--primary-color); border-color: var(--primary-color); }
        .stat-circle {
            width: 120px; height: 120px; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 0 auto 10px; border: 5px solid #eee;
            background: white; transition: all 0.3s ease;
        }
        .stat-circle h2 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        .circle-users { border-color: #6200EE; color: #6200EE; }
        .circle-online { border-color: #28a745; color: #28a745; }
        .circle-media { border-color: #ffc107; color: #ffc107; }
        .circle-requests { border-color: #dc3545; color: #dc3545; }
        .online-dot { width: 10px; height: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .offline-dot { width: 10px; height: 10px; background-color: #dc3545; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .admin-section { padding: 20px 0; }
        .app-logo { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; border: 2px solid white; }
        .login-logo { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 20px; border: 3px solid #6200EE; }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay hidden">
        <div class="text-center">
            <div class="spinner-border text-primary mb-2"></div>
            <div class="fw-bold">Processing...</div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar navbar-dark mb-4 hidden" id="main-nav">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="../app/src/main/res/drawable/icon.png" alt="Logo" class="app-logo">
                <span>Gokudiyugam Admin</span>
            </a>
            <div class="d-flex align-items-center">
                <span id="admin-name" class="text-light me-3 small"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Login Screen -->
    <div class="container" id="login-container">
        <div class="card admin-card p-4 text-center mx-auto" style="max-width: 400px; margin-top: 100px;">
            <img src="../app/src/main/res/drawable/icon.png" alt="Logo" class="login-logo mx-auto">
            <h3 class="mb-4">Admin Login</h3>
            <input type="email" id="admin-email" class="form-control mb-3" placeholder="Email">
            <input type="password" id="admin-password" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
            <p id="login-error" class="text-danger mt-3 small"></p>
        </div>
    </div>

    <!-- Dashboard Content -->
    <div class="container hidden" id="dashboard-container">
        <div class="row g-4">
            <div class="col-md-3">
                <div class="list-group admin-card">
                    <button class="list-group-item list-group-item-action active" id="btn-overview" onclick="showSection('overview')"><i class="bi bi-grid-fill me-2"></i>Overview</button>
                    <button class="list-group-item list-group-item-action" id="btn-media" onclick="showSection('media')"><i class="bi bi-collection-play-fill me-2"></i>Media</button>
                    <button class="list-group-item list-group-item-action" id="btn-users" onclick="showSection('users')"><i class="bi bi-people-fill me-2"></i>Users</button>
                    <button class="list-group-item list-group-item-action" id="btn-app-status" onclick="showSection('app-status')"><i class="bi bi-toggles me-2"></i>Control</button>
                </div>
            </div>

            <div class="col-md-9">
                <div id="overview-section" class="admin-section">
                    <div class="row g-3 text-center">
                        <div class="col"><div class="stat-circle circle-users"><h2 id="count-users">0</h2></div><small class="fw-bold text-muted">Total Users</small></div>
                        <div class="col"><div class="stat-circle circle-online"><h2 id="count-online">0</h2></div><small class="fw-bold text-muted">Online Now</small></div>
                        <div class="col"><div class="stat-circle circle-media"><h2 id="count-media">0</h2></div><small class="fw-bold text-muted">Media Items</small></div>
                    </div>
                </div>

                <div id="users-section" class="admin-section hidden">
                    <div class="card admin-card p-4">
                        <div class="d-flex justify-content-between mb-3 align-items-center">
                            <h4>User Management</h4>
                            <input type="text" id="user-search" class="form-control w-50" placeholder="Search by email..." onkeyup="filterUsers()">
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead><tr><th>Status</th><th>User Email</th><th>Display Name</th><th>Role</th></tr></thead>
                                <tbody id="users-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="media-section" class="admin-section hidden">
                    <div class="card admin-card p-4">
                        <div class="d-flex justify-content-between mb-3"><h4>All Media</h4></div>
                        <table class="table"><tbody id="media-table-body"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const config = {
          apiKey: "AIzaSyBRWLPcr_2QOJe7FcUZkvscAXheHqBt1F0",
          authDomain: "gokudiyugam.firebaseapp.com",
          projectId: "gokudiyugam",
          storageBucket: "gokudiyugam.firebasestorage.app",
          messagingSenderId: "728177722635",
          appId: "1:728177722635:web:633b40e207c597910ace0e"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        // Crucial fix: connect to 'mediadata' database name
        const db = firebase.app().firestore('mediadata');

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWhvllOpg_I_45hCpuibbe7eKfRKPWFN93NCAGNup6giseDkwl7PfqsdAkq_6jAlmT/exec";
        let allUsers = [];

        function showLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }

        function login() {
            const e = document.getElementById('admin-email').value, p = document.getElementById('admin-password').value;
            if(!e || !p) { alert("Please enter credentials"); return; }
            showLoader(true);
            auth.signInWithEmailAndPassword(e, p).catch(err => {
                showLoader(false);
                document.getElementById('login-error').innerText = err.message;
            });
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        function filterUsers() {
            const term = document.getElementById('user-search').value.toLowerCase();
            const rows = document.querySelectorAll('#users-table-body tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        }

        function updateRole(id, role) {
            if(!role || !confirm("Update user role to " + role + "?")) return;
            showLoader(true);
            db.collection('users').doc(id).update({role: role}).then(() => {
                const user = allUsers.find(u => u.id === id);
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        uid: id, email: user.email, role: role,
                        firstName: user.name || "", lastName: "", middleName: "", mobileNumber: "", dob: "", gender: "", password: ""
                    })
                }).then(() => {
                    showLoader(false);
                    alert("Updated successfully!");
                }).catch(() => {
                    showLoader(false);
                    alert("Sync partially failed.");
                });
            }).catch(err => { showLoader(false); alert(err.message); });
        }

        function loadStats() {
            // Live Stats Update
            db.collection('users').onSnapshot(snap => {
                document.getElementById('count-users').innerText = snap.size;
                let online = 0;
                snap.forEach(doc => { if(doc.data().isOnline) online++; });
                document.getElementById('count-online').innerText = online;
            });
            db.collection('mediadata').onSnapshot(snap => {
                document.getElementById('count-media').innerText = snap.size;
            });
        }

        function loadUsers() {
            db.collection('users').onSnapshot(snap => {
                allUsers = [];
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';
                snap.forEach(doc => {
                    const u = {id: doc.id, ...doc.data()};
                    allUsers.push(u);
                    const status = u.isOnline ? '<span class="online-dot"></span>' : '<span class="offline-dot"></span>';
                    const currentRole = u.role || 'NORMAL';
                    tbody.innerHTML += `<tr>
                        <td>${status}</td>
                        <td>${u.email || 'No Email'}</td>
                        <td>${u.name || 'No Name'}</td>
                        <td>
                            <select class="form-select form-select-sm" onchange="updateRole('${u.id}',this.value)">
                                <option value="NORMAL" ${currentRole==='NORMAL'?'selected':''}>NORMAL</option>
                                <option value="HOST" ${currentRole==='HOST'?'selected':''}>HOST</option>
                                <option value="SUB_HOST" ${currentRole==='SUB_HOST'?'selected':''}>SUB_HOST</option>
                            </select>
                        </td>
                    </tr>`;
                });
            });
        }

        function showSection(sec) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.list-group-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + sec).classList.add('active');
            document.getElementById(sec + '-section').classList.remove('hidden');
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
                document.getElementById('admin-name').innerText = user.email;
                loadStats();
                loadUsers();
            }
            showLoader(false);
        });
    </script>
</body>
</html>
